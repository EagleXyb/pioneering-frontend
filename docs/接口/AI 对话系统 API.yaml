              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: 文件格式不支持或超出大小限制
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 Token 已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 上传频率超限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upload/{fileId}:
    delete:
      summary: 删除文件
      tags: [Upload]
      security:
        - BearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          description: 文件唯一标识
          schema:
            type: string
            example: "file_20260523d4e5f6"
      responses:
        '204':
          description: 删除成功
        '401':
          description: 未认证或 Token 已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权限删除该文件
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 文件不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ========== 系统接口 ==========
  /system/models:
    get:
      summary: 获取可用模型列表
      tags: [System]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelInfo'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /system/config:
    get:
      summary: 获取系统配置
      tags: [System]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemConfig'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      summary: 健康检查
      tags: [System]
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                    description: 服务状态
                    example: "healthy"
                  version:
                    type: string
                    description: 当前服务版本号
                    example: "1.0.0"
                  timestamp:
                    type: string
                    format: date-time
                    description: 当前服务器时间
                    example: "2026-05-23T16:00:00Z"
        '500':
          description: 服务异常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'