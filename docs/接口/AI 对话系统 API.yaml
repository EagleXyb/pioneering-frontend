        - name: sessionId
          in: path
          required: true
          description: 会话唯一标识
          schema:
            type: string
            example: "sess_20260523a1b2c3"
        - name: cursor
          in: query
          description: 游标（消息 ID，为空则从最新消息开始获取）
          schema:
            type: string
            example: "msg_20260523x7y8z5"
        - name: limit
          in: query
          description: 返回消息数量
          schema:
            type: integer
            default: 30
            example: 30
        - name: direction
          in: query
          description: 游标方向（before=游标之前的消息，after=游标之后的消息）
